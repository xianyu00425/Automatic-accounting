<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试</title>
</head>
<body>
    <h1>启动页测试</h1>
    <div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:blue;color:white;display:flex;justify-content:center;align-items:center;">
        <h1>启动页...</h1>
    </div>
    <div id="app" style="display:none;">
        <h1>主界面显示!</h1>
        <p>如果看到这个，说明 JS 正常工作</p>
    </div>
    <script>
        setTimeout(function() {
            console.log('执行 JS');
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }, 1000);
    </script>
</body>
</html>
