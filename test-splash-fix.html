<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动页修复测试</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        /* 启动页样式 */
        #test-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        #test-splash.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .splash-content {
            text-align: center;
            color: white;
        }
        
        .splash-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 主应用样式 */
        #test-app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px;
            display: none;
        }
        
        #test-app:not(.hidden) {
            display: block;
        }
        
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
        }
        
        .status {
            padding: 10px;
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            margin: 10px 0;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <!-- 启动页 -->
    <div id="test-splash">
        <div class="splash-content">
            <div class="splash-icon">🚀</div>
            <h1>启动页测试</h1>
            <p>正在加载应用...</p>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="test-app" class="hidden">
        <h1>✅ 应用已成功加载！</h1>
        
        <div class="test-card">
            <h2>测试说明</h2>
            <p>这个页面用于测试启动页修复功能是否正常工作。</p>
            
            <div class="status">
                <strong>当前状态：</strong>
                <span id="status-text">检测中...</span>
            </div>
            
            <div style="margin-top: 20px;">
                <h3>测试项目：</h3>
                <button onclick="testNormalHide()">测试正常隐藏</button>
                <button onclick="testForceHide()">测试强制隐藏</button>
                <button onclick="testError()">测试错误处理</button>
            </div>
        </div>
        
        <div class="test-card">
            <h3>控制台日志</h3>
            <div id="log-container" style="background: #f5f5f5; padding: 10px; border-radius: 5px; max-height: 300px; overflow-y: auto; font-size: 12px; font-family: monospace;">
            </div>
        </div>
    </div>

    <script>
        // 日志函数
        function log(message) {
            const logContainer = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${time}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(message);
        }

        // 检测启动页状态
        function checkSplashStatus() {
            const splash = document.getElementById('test-splash');
            const app = document.getElementById('test-app');
            
            if (splash.classList.contains('hidden')) {
                document.getElementById('status-text').textContent = '✅ 启动页已隐藏';
                document.getElementById('status-text').style.color = 'green';
            } else {
                document.getElementById('status-text').textContent = '⚠️ 启动页仍显示';
                document.getElementById('status-text').style.color = 'orange';
            }
        }

        // 正常隐藏测试
        function testNormalHide() {
            log('执行正常隐藏测试...');
            const splash = document.getElementById('test-splash');
            const app = document.getElementById('test-app');
            
            splash.classList.add('hidden');
            app.classList.remove('hidden');
            
            setTimeout(() => {
                log('✅ 正常隐藏测试完成');
                checkSplashStatus();
            }, 600);
        }

        // 强制隐藏测试
        function testForceHide() {
            log('执行强制隐藏测试...');
            const splash = document.getElementById('test-splash');
            const app = document.getElementById('test-app');
            
            splash.style.display = 'none';
            app.classList.remove('hidden');
            
            setTimeout(() => {
                log('✅ 强制隐藏测试完成');
                checkSplashStatus();
            }, 100);
        }

        // 错误处理测试
        function testError() {
            log('执行错误处理测试...');
            try {
                throw new Error('模拟错误');
            } catch (error) {
                log('❌ 捕获错误：' + error.message);
                const splash = document.getElementById('test-splash');
                const app = document.getElementById('test-app');
                splash.classList.add('hidden');
                app.classList.remove('hidden');
                checkSplashStatus();
            }
        }

        // 模拟应用初始化
        function initApp() {
            log('=================================');
            log('应用开始初始化...');
            
            try {
                // 模拟初始化过程
                log('初始化数据...');
                setTimeout(() => {
                    log('渲染界面...');
                    setTimeout(() => {
                        log('隐藏启动页...');
                        const splash = document.getElementById('test-splash');
                        const app = document.getElementById('test-app');
                        
                        splash.classList.add('hidden');
                        app.classList.remove('hidden');
                        
                        log('✅ 应用初始化完成');
                        checkSplashStatus();
                    }, 500);
                }, 500);
                
            } catch (error) {
                log('❌ 初始化失败：' + error.message);
                const splash = document.getElementById('test-splash');
                const app = document.getElementById('test-app');
                splash.classList.add('hidden');
                app.classList.remove('hidden');
                checkSplashStatus();
            }
        }

        // 页面加载完成后自动初始化
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM 加载完成');
            
            // 超时保护：3 秒后强制显示
            const forceShow = setTimeout(function() {
                log('⏰ 超时保护触发');
                const splash = document.getElementById('test-splash');
                const app = document.getElementById('test-app');
                if (splash) splash.classList.add('hidden');
                if (app) app.classList.remove('hidden');
                checkSplashStatus();
            }, 3000);
            
            // 开始初始化
            initApp();
        });
    </script>
</body>
</html>
