<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用分析渲染测试</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; max-width: 900px; margin: 0 auto; }
pre { background: #16213e; padding: 10px; border-radius: 6px; white-space: pre-wrap; margin: 4px 0; }
.ok { color: #4CAF50; } .err { color: #F44336; } .warn { color: #FF9800; }
button { padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
</style>
</head>
<body>
<h2>费用分析渲染测试</h2>
<button onclick="doTest()">运行测试</button>
<div id="out"></div>

<script src="js/app.js"></script>
<script>
var out = document.getElementById('out');
function L(msg, cls) { out.innerHTML += '<pre class="' + (cls||'') + '">' + msg + '</pre>'; }

function doTest() {
    out.innerHTML = '';
    L('=== 测试开始 ===');

    // 1. AppState
    L('1. window.AppState: ' + (typeof window.AppState), typeof window.AppState === 'object' ? 'ok' : 'err');
    L('   AppState (bare): ' + (typeof AppState));
    L('   AppState === window.AppState: ' + (AppState === window.AppState));

    // 2. currentMonth
    var cm = AppState.currentMonth;
    L('2. currentMonth: ' + cm.getFullYear() + '年' + (cm.getMonth()+1) + '月', 'ok');

    // 3. 交易数据
    var tx = AppState.getTransactions();
    L('3. 交易总数: ' + tx.length, tx.length > 0 ? 'ok' : 'warn');

    // 4. 分类
    var cats = AppState.getCategories();
    L('4. 分类数: ' + cats.length, cats.length > 0 ? 'ok' : 'warn');
    for (var c = 0; c < cats.length && c < 5; c++) {
        L('   id=' + cats[c].id + ' name=' + cats[c].name + ' type=' + cats[c].type);
    }

    // 5. getCategory 测试
    if (cats.length > 0) {
        var testCat = AppState.getCategory(cats[0].id);
        L('5. getCategory(' + cats[0].id + '): ' + (testCat ? testCat.name : 'NOT FOUND'), testCat ? 'ok' : 'err');
    }

    // 6. 模拟筛选 3月支出
    var targetYear = cm.getFullYear();
    var targetMonth = cm.getMonth();
    var expTx = [];
    for (var i = 0; i < tx.length; i++) {
        var d = new Date(tx[i].date);
        if (tx[i].type === 'expense' && d.getFullYear() === targetYear && d.getMonth() === targetMonth) {
            expTx.push(tx[i]);
        }
    }
    L('6. ' + targetYear + '年' + (targetMonth+1) + '月支出: ' + expTx.length + ' 笔', expTx.length > 0 ? 'ok' : 'warn');

    // 7. 汇总
    var catMap = {}, total = 0;
    for (var k = 0; k < expTx.length; k++) {
        var item = expTx[k];
        var cat = AppState.getCategory(item.categoryId);
        var name = cat ? cat.name : '未分类';
        var amt = Math.abs(item.amount);
        total += amt;
        catMap[name] = (catMap[name] || 0) + amt;
    }
    L('7. 支出总额: ¥' + total.toFixed(2));
    var entries = [];
    for (var nm in catMap) entries.push({name: nm, amount: catMap[nm]});
    entries.sort(function(a,b){return b.amount-a.amount;});
    for (var e = 0; e < entries.length; e++) {
        var pct = total > 0 ? ((entries[e].amount / total) * 100).toFixed(1) : 0;
        L('   ' + entries[e].name + ': ¥' + entries[e].amount.toFixed(2) + ' (' + pct + '%)');
    }

    // 8. 调用 renderExpenseAnalysis
    L('8. window.renderExpenseAnalysis: ' + (typeof window.renderExpenseAnalysis), typeof window.renderExpenseAnalysis === 'function' ? 'ok' : 'err');

    if (typeof window.renderExpenseAnalysis === 'function') {
        try {
            L('   调用前 debug: ' + JSON.stringify(window._expenseAnalysisDebug || {}));
            window.renderExpenseAnalysis();
            L('   调用后 debug: ' + JSON.stringify(window._expenseAnalysisDebug || {}), 'ok');
        } catch(e) {
            L('   调用出错: ' + e.message + '\n' + e.stack, 'err');
        }
    }

    L('=== 测试完成 ===');
    L('请检查页面中的"费用分析"区域是否已显示图表');
}
</script>
</body>
</html>
